name: Knowledge Base Integration Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest aiofiles

      # FastEmbed downloads ~25 MB of model weights on first run.
      # Cache them so subsequent CI runs take ~7 s instead of ~40 s.
      - name: Cache FastEmbed model weights
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: fastembed-bge-small-en-v1.5-${{ runner.os }}

      - name: Run knowledge base integration tests
        run: python -m pytest tests/test_knowledge_base.py -v --tb=short
